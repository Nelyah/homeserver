# WhatsApp bridge configuration
# Secrets are injected via environment variables with BRIDGE_ prefix

env_config_prefix: BRIDGE_

homeserver:
  address: http://synapse:8008
  domain: nelyah.eu
  software: standard
  async_media: true

appservice:
  address: http://mautrix-whatsapp:29318
  hostname: 0.0.0.0
  port: 29318
  id: mautrix-whatsapp
  bot:
    username: whatsappbot
    displayname: WhatsApp Bridge Bot
    avatar: mxc://maunium.net/NeXNQarUbrlYBiPCpprYsRqr
  username_template: "whatsapp_{{.}}"
  # as_token and hs_token set via BRIDGE_appservice__as_token and BRIDGE_appservice__hs_token

database:
  type: postgres
  # uri set via BRIDGE_database__uri

network:
  displayname_template: '{{or .FullName .BusinessName .PushName .Phone .RedactedPhone "Unknown user"}}'
  whatsapp_thumbnail: true
  url_previews: true
  history_sync:
    max_initial_conversations: -1
    request_full_sync: true

matrix:
  delivery_receipt: true
  message_error_notices: true

backfill:
  enabled: true
  unread_hours_threshold: 2160

bridge:
  command_prefix: "!wa"
  private_chat_portal_meta: true
  permissions:
    "@nelyah:nelyah.eu": admin

double_puppet:
  secrets:
    nelyah.eu: ""
  servers:
    nelyah.eu: "http://synapse:8008"

encryption:
  allow: true
  msc4190: true
  msc4392: true
  self_sign: true
  default: true
  require: false
  appservice: true
  allow_key_sharing: true
  # pickle_key set via BRIDGE_encryption__pickle_key

# provisioning.shared_secret set via BRIDGE_provisioning__shared_secret

logging:
  min_level: info
  writers:
    - type: stdout
      format: pretty-colored
