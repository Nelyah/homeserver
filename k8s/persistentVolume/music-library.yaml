apiVersion: v1
kind: PersistentVolume
metadata:
  name: music-library
spec:
  local:
    path: /data/music/library
  capacity:
    storage: 1Ti
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - home-stockholm
