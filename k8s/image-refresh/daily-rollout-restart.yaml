---
apiVersion: v1
kind: Namespace
metadata:
  name: image-refresh
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-refresh
  namespace: image-refresh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-refresh-rollout-restarter
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-refresh-rollout-restarter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-refresh-rollout-restarter
subjects:
  - kind: ServiceAccount
    name: image-refresh
    namespace: image-refresh
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-refresh
  namespace: image-refresh
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: image-refresh
          restartPolicy: OnFailure
          containers:
            - name: image-refresh
              image: homeserver/image-refresh:latest
              imagePullPolicy: IfNotPresent
